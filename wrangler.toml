name = "climabr-worker"
main = "worker/index.ts"
compatibility_date = "2025-05-28"
compatibility_flags = ["nodejs_compat"]

[vars]
SITE_URL = "https://climabr.app"

[[routes]]
pattern = "climabr.app/*"
zone_name = "climabr.app"

# Desenvolvimento local (o Worker importa .wasm, então usar wrangler dev):
#   npm run dev   (Astro :4321)
#   npx wrangler dev --port 8788 --var SITE_URL:http://localhost:4321
# O Worker lê os JSONs do Astro e gera curl/SVG/PNG/Prometheus.
