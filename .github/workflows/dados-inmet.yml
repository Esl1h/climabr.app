name: Coleta CPTEC/INMET (a cada 3h)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      estado:
        description: 'Estado para coletar (ex: sp). Deixe vazio para todos.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Coleta previsão CPTEC
        env:
          ESTADO: ${{ github.event.inputs.estado }}
        run: |
          if [ -n "$ESTADO" ]; then
            if ! printf '%s' "$ESTADO" | grep -qE '^[a-z]{2}$'; then
              echo "Estado inválido (esperado 2 letras minúsculas): $ESTADO" >&2
              exit 1
            fi
            python3 scripts/scrape-inmet.py "$ESTADO"
          else
            python3 scripts/scrape-inmet.py
          fi

      - name: Commit dados locais
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'dados: previsão CPTEC atualizada'
          file_pattern: 'data/cidades/**/*.json'
          push_options: '--force-with-lease'
        continue-on-error: true
