name: Coleta ANA + INPE (a cada 6h)

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Coleta reservatórios ANA
        run: python3 scripts/scrape-ana.py

      - name: Coleta queimadas INPE
        run: python3 scripts/scrape-inpe.py

      - name: Commit dados locais (fallback)
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'dados: ANA + INPE atualizados'
          file_pattern: 'data/cidades/**/*.json'
          push_options: '--force-with-lease'
        continue-on-error: true
